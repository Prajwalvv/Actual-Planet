<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Rylvo</title>
<link rel="stylesheet" href="/style.css">
<style>
.error-page{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px}
.error-code{font-family:var(--mono);font-size:6rem;font-weight:800;color:var(--accent);opacity:.3;line-height:1}
.error-msg{font-size:1.1rem;color:var(--text2);margin:16px 0 32px;max-width:400px}
</style>
</head>
<body>
<div class="error-page">
  <div class="error-code">404</div>
  <h2>Page not found</h2>
  <p class="error-msg">The page you're looking for doesn't exist or has been moved.</p>
  <a href="/" class="btn btn-primary">Back to home</a>
</div>
</body>
</html>
