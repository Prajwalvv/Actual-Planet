<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rylvo — Real-time Intelligence for LLMs</title>
  <meta name="description" content="Give your AI real-time, cross-validated intelligence. One API call. Thousands of autonomous agents. Zero hallucination.">
  <style>
    /* Hero 3D Section */
    .hero-3d {
      position: relative;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .hero-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    .hero-content {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 160px 0 100px;
    }

    .hero-badge {
      margin-bottom: 24px;
    }

    .hero-content h1 {
      max-width: 800px;
      margin: 0 auto 20px;
      font-size: clamp(2.5rem, 5vw, 4rem);
    }

    .hero-content p {
      max-width: 560px;
      margin: 0 auto 40px;
      font-size: 1.1rem;
    }

    .hero-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-bottom: 60px;
    }

    /* Animations */
    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .fade-up {
      animation: fadeUp 0.6s ease-out forwards;
      opacity: 0;
    }

    .delay-1 { animation-delay: 0.1s; }
    .delay-2 { animation-delay: 0.2s; }
    .delay-3 { animation-delay: 0.3s; }
    .delay-4 { animation-delay: 0.4s; }

    /* Stats Section */
    .section-sm {
      padding: 60px 0;
    }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 24px;
      margin-top: 60px;
    }

    .stat {
      text-align: center;
    }

    .stat-val {
      font-family: var(--mono);
      font-size: 2.4rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent2), var(--accent3));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .stat-label {
      font-size: 0.8rem;
      color: var(--text3);
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* Features */
    .features-header {
      text-align: center;
      max-width: 600px;
      margin: 0 auto 60px;
    }

    .features-header p {
      margin-top: 16px;
    }

    .feature-card {
      padding: 32px;
    }

    .feature-card h3 {
      margin-top: 4px;
      margin-bottom: 10px;
    }

    .feature-card p {
      font-size: 0.9rem;
      line-height: 1.6;
    }

    .feature-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
      font-size: 18px;
    }

    .feature-icon.indigo {
      background: rgba(99, 102, 241, 0.1);
      color: var(--accent2);
    }

    .feature-icon.green {
      background: rgba(34, 197, 94, 0.1);
      color: var(--green);
    }

    .feature-icon.cyan {
      background: rgba(6, 182, 212, 0.1);
      color: var(--cyan);
    }

    /* CTA Section */
    .cta-section {
      text-align: center;
      padding: 120px 0;
      position: relative;
    }

    .cta-section h2 {
      margin-bottom: 16px;
    }

    .cta-section p {
      max-width: 480px;
      margin: 0 auto 32px;
    }

    @media (max-width: 768px) {
      .hero-content {
        padding: 120px 0 60px;
      }
      .stats-row {
        grid-template-columns: repeat(2, 1fr);
        gap: 32px;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/index.jsx"></script>
</body>
</html>
