<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log in — Rylvo</title>
<link rel="stylesheet" href="style.css">
<style>
.auth-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;position:relative}
.auth-page::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:600px;height:400px;background:radial-gradient(ellipse,rgba(99,102,241,.06) 0%,transparent 70%);pointer-events:none}
.auth-card{width:100%;max-width:400px;position:relative;z-index:1}
.auth-logo{text-align:center;margin-bottom:36px}
.auth-logo a{font-family:var(--mono);font-size:18px;font-weight:700;letter-spacing:1.5px;color:var(--accent2)}
.auth-logo a span{color:var(--text3);font-weight:400;letter-spacing:0}
.auth-title{text-align:center;margin-bottom:32px}
.auth-title h2{font-size:1.4rem;margin-bottom:6px}
.auth-title p{font-size:.875rem;color:var(--text3)}
.auth-form .btn{width:100%;margin-top:4px}
.auth-divider{display:flex;align-items:center;gap:16px;margin:24px 0;font-size:.8rem;color:var(--text3)}
.auth-divider::before,.auth-divider::after{content:'';flex:1;height:1px;background:var(--border)}
.social-btns{display:flex;flex-direction:column;gap:10px;margin-bottom:24px}
.btn-social{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:11px 16px;font-size:.875rem;font-weight:500;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius-sm);color:var(--text);cursor:pointer;transition:all var(--transition);font-family:var(--sans)}
.btn-social:hover{background:var(--bg3);border-color:var(--accent)}
.btn-social svg{width:18px;height:18px}
.auth-footer{text-align:center;margin-top:28px;font-size:.85rem;color:var(--text3)}
.auth-footer a{color:var(--accent2);font-weight:500}

@media(max-width:768px){
  .auth-page{padding:16px}
  .auth-card{max-width:100%}
  .auth-logo{margin-bottom:28px}
  .auth-logo a{font-size:16px}
  .auth-logo a span{font-size:1.4rem}
  .auth-logo svg{width:32px;height:32px}
  .auth-title{margin-bottom:24px}
  .auth-title h2{font-size:1.2rem}
  .auth-title p{font-size:.8rem}
  .btn-social{padding:10px 14px;font-size:.8rem}
  .btn-social svg{width:16px;height:16px}
  .auth-divider{margin:20px 0;font-size:.75rem}
  .auth-footer{margin-top:24px;font-size:.8rem}
}

@media(max-width:480px){
  .auth-page{padding:12px}
  .auth-logo{margin-bottom:24px}
  .auth-logo a{font-size:15px}
  .auth-logo a span{font-size:1.2rem}
  .auth-logo svg{width:28px;height:28px}
  .auth-title h2{font-size:1.1rem}
  .auth-title p{font-size:.75rem}
  .btn-social{padding:9px 12px;font-size:.75rem}
  .social-btns{gap:8px}
  .auth-divider{margin:16px 0}
  .input-group{margin-bottom:14px}
  .auth-footer{font-size:.75rem}
}
</style>
</head>
<body class="pt-nav">

<div class="auth-page">
  <div class="auth-card fade-up">
    <div class="auth-logo"><a href="/" style="display: inline-flex; align-items: center; gap: 10px;">
      <svg width="40" height="40" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="16" cy="16" r="2.5" fill="currentColor"/>
        <circle cx="8" cy="10" r="1.8" fill="currentColor" opacity="0.7"/>
        <circle cx="24" cy="10" r="1.8" fill="currentColor" opacity="0.7"/>
        <circle cx="8" cy="22" r="1.8" fill="currentColor" opacity="0.7"/>
        <circle cx="24" cy="22" r="1.8" fill="currentColor" opacity="0.7"/>
        <circle cx="16" cy="6" r="1.8" fill="currentColor" opacity="0.7"/>
        <circle cx="16" cy="26" r="1.8" fill="currentColor" opacity="0.7"/>
        <line x1="16" y1="16" x2="8" y2="10" stroke="currentColor" stroke-width="1.2" opacity="0.4"/>
        <line x1="16" y1="16" x2="24" y2="10" stroke="currentColor" stroke-width="1.2" opacity="0.4"/>
        <line x1="16" y1="16" x2="8" y2="22" stroke="currentColor" stroke-width="1.2" opacity="0.4"/>
        <line x1="16" y1="16" x2="24" y2="22" stroke="currentColor" stroke-width="1.2" opacity="0.4"/>
        <line x1="16" y1="16" x2="16" y2="6" stroke="currentColor" stroke-width="1.2" opacity="0.4"/>
        <line x1="16" y1="16" x2="16" y2="26" stroke="currentColor" stroke-width="1.2" opacity="0.4"/>
        <line x1="8" y1="10" x2="16" y2="6" stroke="currentColor" stroke-width="1" opacity="0.25"/>
        <line x1="24" y1="10" x2="16" y2="6" stroke="currentColor" stroke-width="1" opacity="0.25"/>
        <line x1="8" y1="22" x2="16" y2="26" stroke="currentColor" stroke-width="1" opacity="0.25"/>
        <line x1="24" y1="22" x2="16" y2="26" stroke="currentColor" stroke-width="1" opacity="0.25"/>
      </svg>
      <span style="font-size: 1.8rem; font-weight: 700;">RYLVO</span>
    </a></div>
    <div class="auth-title">
      <h2>Welcome back</h2>
      <p>Log in to your developer account</p>
    </div>

    <div id="authError" style="display:none;padding:10px 14px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);border-radius:8px;color:#ef4444;font-size:.82rem;margin-bottom:16px;text-align:center"></div>

    <div class="social-btns">
      <button class="btn-social" id="btnGoogle">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12.545 10.239v3.821h5.445c-.712 2.315-2.647 3.972-5.445 3.972a6.033 6.033 0 110-12.064c1.498 0 2.866.549 3.921 1.453l2.814-2.814A9.969 9.969 0 0012.545 2C7.021 2 2.543 6.477 2.543 12s4.478 10 10.002 10c8.396 0 10.249-7.85 9.426-11.748l-9.426-.013z"/></svg>
        Continue with Google
      </button>
      <button class="btn-social" id="btnGithub">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0112 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"/></svg>
        Continue with GitHub
      </button>
    </div>

    <div class="auth-divider">or</div>

    <form class="auth-form" id="loginForm">
      <div class="input-group">
        <label>Email</label>
        <input class="input" type="email" id="email" placeholder="you@company.com" required>
      </div>
      <div class="input-group">
        <label>Password</label>
        <input class="input" type="password" id="password" placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;" required>
      </div>
      <button type="submit" class="btn btn-primary" id="btnSubmit">Log in</button>
    </form>

    <div class="auth-footer">
      <p>Don't have an account? <a href="/signup">Sign up</a></p>
    </div>
  </div>
</div>

<script type="module" src="firebase-init.js"></script>
<script type="module">
  const { onAuth, loginWithEmail, loginWithGoogle, loginWithGithub } = window.SwarmAuth || {};

  // Wait for SwarmAuth to be available
  function waitForAuth() {
    return new Promise(resolve => {
      if (window.SwarmAuth) return resolve(window.SwarmAuth);
      const iv = setInterval(() => {
        if (window.SwarmAuth) { clearInterval(iv); resolve(window.SwarmAuth); }
      }, 50);
    });
  }

  function showError(msg) {
    const el = document.getElementById('authError');
    el.textContent = msg;
    el.style.display = 'block';
  }
  function hideError() { document.getElementById('authError').style.display = 'none'; }
  function setLoading(btn, loading) {
    btn.disabled = loading;
    btn.style.opacity = loading ? '0.6' : '1';
  }

  (async () => {
    const SA = await waitForAuth();

    // If already logged in, redirect
    SA.onAuth(user => { if (user) window.location.href = '/console'; });

    // Email login
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      hideError();
      const btn = document.getElementById('btnSubmit');
      setLoading(btn, true);
      try {
        await SA.loginWithEmail(
          document.getElementById('email').value,
          document.getElementById('password').value
        );
        window.location.href = '/console';
      } catch (err) {
        showError(friendlyError(err.code));
        setLoading(btn, false);
      }
    });

    // Google
    document.getElementById('btnGoogle').addEventListener('click', async () => {
      hideError();
      try { await SA.loginWithGoogle(); window.location.href = '/console'; }
      catch (err) { showError(friendlyError(err.code)); }
    });

    // GitHub
    document.getElementById('btnGithub').addEventListener('click', async () => {
      hideError();
      try { await SA.loginWithGithub(); window.location.href = '/console'; }
      catch (err) { showError(friendlyError(err.code)); }
    });
  })();

  function friendlyError(code) {
    const map = {
      'auth/user-not-found': 'No account found with this email.',
      'auth/wrong-password': 'Incorrect password.',
      'auth/invalid-email': 'Invalid email address.',
      'auth/too-many-requests': 'Too many attempts. Try again later.',
      'auth/popup-closed-by-user': 'Sign-in popup was closed.',
      'auth/account-exists-with-different-credential': 'Account exists with a different sign-in method.',
      'auth/invalid-credential': 'Invalid email or password.',
    };
    return map[code] || 'Something went wrong. Please try again.';
  }
</script>
</body>
</html>
